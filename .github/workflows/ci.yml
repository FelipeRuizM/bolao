name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        env:
          VITE_FIREBASE_API_KEY: ci-dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci-dummy
          VITE_FIREBASE_DATABASE_URL: https://ci-dummy.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: ci-dummy
          VITE_FIREBASE_APP_ID: ci-dummy
        run: npm run build

      - name: Test
        run: npm test
